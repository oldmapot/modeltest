        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding-bottom: 40px; color: var(--text); overflow-x: hidden; }

        .loader-icon { width: 60px; height: 35px; background: #333; border-radius: 0 0 25px 25px; position: relative; border: 3px solid #222; }

        .loader-icon.so { width: 55px; height: 40px; background: #ffcc00; border-radius: 15px 15px 8px 8px; border-top: 10px solid #663300; animation: wobble 0.7s infinite; }

        @keyframes wobble { 0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)} }

        .main-title { font-size: 8.5vw; font-weight: 900; }
        .logout-btn { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 14px; cursor: pointer; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 14px; border-radius: 20px; z-index: 10; transition: background 0.2s; font-weight: bold; letter-spacing: 0.5px; }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card-bg); box-shadow: 2px 0 12px rgba(0,0,0,0.15); z-index: 10000; transition: left 0.3s ease; overflow-y: auto; }
        .side-menu.open { left: 0; }
        .side-menu-header { background: var(--primary); color: #fff; padding: 30px 20px; text-align: center; }
        .side-menu-header h3 { margin: 0; font-size: 24px; font-weight: bold; }
        .side-menu-items { padding: 20px 0; }
        .side-menu-item { display: block; width: 100%; padding: 18px 24px; background: none; border: none; text-align: left; font-size: 18px; color: var(--text); cursor: pointer; border-bottom: 1px solid #f0f0f0; font-weight: bold; }
        .side-menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: none; }
        .side-menu-overlay.show { display: block; }

            padding-bottom: 20px;
        }

        .code-container { display: flex; justify-content: center; align-items: center; min-height: 200px; margin-bottom: 12px; }
        #qrcode { width: 55vw; height: 55vw; max-width: 220px; max-height: 220px; }

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyJHTOyuXMiNX7drQZpjTsQpolrT8isTQTR4HBH05bA-WB_p8Ns1qmBsA6uQel-F60-/exec";
const LIFF_ID = "2009761099-xXvMY51i";
let userId = '', userData = null, currentFrom = 'omp', referrerParam = '', userToken = '', pendingCheckboxId = null;
let countdownInterval = null;
let currentCountdown = 60;
let idleTimer = null;
const IDLE_TIMEOUT = 5 * 60 * 1000; // 5 分鐘

// ============================================================
// ✅ 登出函數
// ============================================================
function logout() {
    if (confirm('⚠️ 確定要登出嗎？\n\n登出後將清除所有資料，請重新登入。')) {
        showToast('🔄 正在登出...');
        performLogout();
    }
}

function performLogout() {
    sessionStorage.clear();
    localStorage.clear();
    document.cookie.split(";").forEach(function(c) { 
        document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
    });
    try {
        if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
            liff.logout();
        }
    } catch(e) { console.log('LIFF logout error:', e); }
    
    setTimeout(function() {
        document.body.innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;background:#fdf5e6;text-align:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">
                <div style="font-size:64px;margin-bottom:20px;">👋</div>
                <div style="font-size:24px;font-weight:bold;color:#8b0000;margin-bottom:10px;">已登出</div>
                <div style="font-size:15px;color:#666;margin-bottom:30px;line-height:1.8;">感謝您的使用<br>點擊下方按鈕重新登入</div>
                <button onclick="location.reload()" style="width:100%;max-width:300px;padding:16px;background:#8b0000;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;">🔄 重新登入</button>
                <div style="margin-top:20px;font-size:12px;color:#ccc;">老娘的一點心意 v1.0</div>
            </div>
        `;
    }, 500);
}

// ============================================================
// ✅ 閒置登出計時器
// ============================================================
function resetIdleTimer() {
    if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
    idleTimer = setTimeout(function() {
        console.log('⏰ 閒置 5 分鐘，自動登出');
        showToast('⏰ 已閒置 5 分鐘，自動登出');
        autoLogout();
    }, IDLE_TIMEOUT);
}

function setupIdleDetection() {
    var events = ['click', 'touchstart', 'scroll', 'keydown', 'mousemove'];
    events.forEach(function(event) {
        document.addEventListener(event, function() { resetIdleTimer(); });
    });
    resetIdleTimer();
}

function autoLogout() {
    sessionStorage.clear();
    localStorage.clear();
    document.cookie.split(";").forEach(function(c) { 
        document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
    });
    try {
        if (typeof liff !== 'undefined' && liff.isLoggedIn()) { liff.logout(); }
    } catch(e) {}
    document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;background:#fdf5e6;text-align:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">

}

// ============================================================
// ✅ 其他函數
// ============================================================
function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2000); }
function openSideMenu() { document.getElementById('sideMenu').classList.add('open'); document.getElementById('sideMenuOverlay').classList.add('show'); }
function closeSideMenu() { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('sideMenuOverlay').classList.remove('show'); }

// ... 中間函數保持不變（openRightsModal, openLegalModal, openShopInfo, openGiftBox, refreshAll, fetchData, doRegister, openEvents, openReferral, openPointHistory, openProfile, autoCopyShare, openModal, closeModal 等）...

// ============================================================
// ✅ initLiff
// ============================================================
async function initLiff() {
    // 檢測電腦版
    var isMobile = /mobile|android|iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
    var isLinePC = !isMobile && /line/i.test(navigator.userAgent.toLowerCase());
    if (isLinePC) {
        console.log('💻 偵測到電腦版 LINE，顯示引導畫面');
        document.getElementById('loading').style.display = 'none';
        showPCMessage();
        return;
    }
    
    var urlParams = new URLSearchParams(window.location.search);
    var isLogout = urlParams.get('logout');
    if (isLogout === 'true') {
        console.log('🚪 登出完成，清除快取並重新導向...');
        sessionStorage.clear();
        localStorage.clear();
        document.cookie.split(";").forEach(function(c) { 
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
        });
        var url = new URL(window.location.href);
        url.searchParams.delete('logout');
        window.location.href = url.toString();
        return;
    }
    
    currentFrom = urlParams.get('from') || 'omp';
    var rawReferrer = urlParams.get('referrer');
    if (rawReferrer) {
        try { referrerParam = decodeURIComponent(rawReferrer); } catch(e) { referrerParam = rawReferrer; }
    } else { referrerParam = ''; }
    referrerParam = referrerParam.trim();
    
    var loadingText = document.getElementById('loading-text');
    var loadingTexts = {
        omp: ["老娘正在翻帳本，幫你算驚喜...", "老娘正在火速趕來...", "別催，老娘正在幫你算點數...", "正在幫您端上熱騰騰的驚喜...", "火鍋滾了，心意也快好了..."],
        swo: ["正在為你的生活，加入一點甜...", "攪拌心意中，請稍候片刻...", "正準備為您送上今日份的療癒...", "心意準備中，等等來點甜的吧！", "STAY SWEET！"]
    };
    var texts = currentFrom === 'so' ? loadingTexts.swo : loadingTexts.omp;
    var randomIndex = Math.floor(Math.random() * texts.length);
    loadingText.innerText = texts[randomIndex];
    
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        var currentUserId = (await liff.getProfile()).userId;
        var storedUserId = sessionStorage.getItem('liff_user_id');
        var storedFrom = sessionStorage.getItem('liff_from');
        
        console.log('🔍 帳號檢測：');
        console.log('   └─ 當前 LINE userId:', currentUserId);
        console.log('   └─ 快取中的 userId:', storedUserId || '(無)');
        
        if (storedUserId && storedUserId !== currentUserId) {
            console.log('🔄 偵測到帳號切換！強制清除所有快取');
            sessionStorage.clear();
            localStorage.clear();
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            showToast('🔄 偵測到帳號變更，重新整理中...');
            await new Promise(function(resolve) { setTimeout(resolve, 1000); });
            var url = new URL(window.location.href);
            url.searchParams.set('t', Date.now());
            window.location.href = url.toString();
            return;
        }
        
        if (!storedUserId) {
            console.log('✅ 首次登入，儲存 userId:', currentUserId);
            sessionStorage.setItem('liff_user_id', currentUserId);
        }
        
        if (storedFrom && storedFrom !== currentFrom) {
            console.log('🔄 偵測到品牌切換！');
            sessionStorage.setItem('liff_from', currentFrom);
        }
        
        sessionStorage.setItem('liff_user_id', currentUserId);
        sessionStorage.setItem('liff_from', currentFrom);
        
        if (!userId || userId !== currentUserId) {
            userId = currentUserId;
            console.log('✅ 設定 userId:', userId);
        }
        
        await fetchData();
        
        // ✅ 啟動閒置檢測
        setupIdleDetection();
        console.log('⏰ 閒置登出計時器已啟動（5 分鐘）');
        
    } catch(e) { 
        console.error('LIFF init error:', e);
        showToast('初始化失敗，請重新開啟頁面'); 
        document.getElementById('loading').style.display = 'none';
    }
}

// ============================================================
// ✅ 頁面加載完成後執行
// ============================================================
document.getElementById('regPhone').addEventListener('input', function(e) {
    var v = e.target.value.replace(/\D/g, '').slice(0, 10);
    if (v.length > 7) v = v.slice(0,4)+'-'+v.slice(4,7)+'-'+v.slice(7);
    else if (v.length > 4) v = v.slice(0,4)+'-'+v.slice(4);
    e.target.value = v;
});

initLiff();
</script>
